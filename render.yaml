services:
  - type: web
    name: maintenance-request-system
    runtime: node
    plan: free
    autoDeploy: true
    rootDir: .
    buildCommand: npm install && cd client && npm install && npm run build && cd .. && npm run prisma:generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
